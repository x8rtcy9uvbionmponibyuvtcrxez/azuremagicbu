version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: azure_inbox_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  powershell-service:
    build:
      context: ./powershell-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PS_SERVICE_PORT: "3099"
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
    ports:
      - "3099:3099"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - powershell-service
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/azure_inbox_ops?schema=public
      REDIS_URL: redis://redis:6379
      PS_SERVICE_URL: http://powershell-service:3099
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID}
      GRAPH_APP_ID: ${GRAPH_APP_ID}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY}
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      SMARTLEAD_API_KEY: ${SMARTLEAD_API_KEY}
      INSTANTLY_API_KEY: ${INSTANTLY_API_KEY}
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - powershell-service
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/azure_inbox_ops?schema=public
      REDIS_URL: redis://redis:6379
      PS_SERVICE_URL: http://powershell-service:3099
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID}
      GRAPH_APP_ID: ${GRAPH_APP_ID}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY}
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      SMARTLEAD_API_KEY: ${SMARTLEAD_API_KEY}
      INSTANTLY_API_KEY: ${INSTANTLY_API_KEY}

volumes:
  postgres_data:
