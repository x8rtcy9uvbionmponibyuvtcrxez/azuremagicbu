version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: azure_inbox_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  powershell-service:
    build:
      context: ./powershell-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PS_SERVICE_PORT: "3099"
    ports:
      - "3099:3099"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3099/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      powershell-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/azure_inbox_ops?schema=public
      REDIS_URL: redis://redis:6379
      PS_SERVICE_URL: http://powershell-service:3099
      CLOUD_MODE: "true"
      NEXT_PUBLIC_CLOUD_MODE: "true"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID}
      GRAPH_APP_ID: ${GRAPH_APP_ID}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY}
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      SMARTLEAD_API_KEY: ${SMARTLEAD_API_KEY:-}
      INSTANTLY_API_KEY: ${INSTANTLY_API_KEY:-}
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      powershell-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/azure_inbox_ops?schema=public
      REDIS_URL: redis://redis:6379
      PS_SERVICE_URL: http://powershell-service:3099
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GRAPH_CLIENT_ID: ${GRAPH_CLIENT_ID}
      GRAPH_CLIENT_SECRET: ${GRAPH_CLIENT_SECRET}
      GRAPH_TENANT_ID: ${GRAPH_TENANT_ID}
      GRAPH_APP_ID: ${GRAPH_APP_ID}
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY}
      CLOUDFLARE_EMAIL: ${CLOUDFLARE_EMAIL}
      SMARTLEAD_API_KEY: ${SMARTLEAD_API_KEY:-}
      INSTANTLY_API_KEY: ${INSTANTLY_API_KEY:-}

volumes:
  postgres_data:
